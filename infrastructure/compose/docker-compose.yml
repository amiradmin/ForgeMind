services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile

    container_name: forgemind-backend

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - ../../backend:/app

    ports:
      - "8000:8000"

    env_file:
      - ../../backend/.env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped

    networks:
      - forgemind-network

  postgres:
    image: postgres:17

    container_name: forgemind-postgres

    environment:
      POSTGRES_DB: forgemind
      POSTGRES_USER: forgemind
      POSTGRES_PASSWORD: forgemind

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U forgemind -d forgemind
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    networks:
      - forgemind-network

  redis:
    image: redis:8-alpine

    container_name: forgemind-redis

    ports:
      - "6379:6379"

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

    networks:
      - forgemind-network

volumes:
  postgres_data:

networks:
  forgemind-network:
    driver: bridge
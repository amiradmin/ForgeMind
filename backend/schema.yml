  /api/v1/assets/:
    get:
      operationId: assets_list
      description: "\n    Manage industrial assets.\n\n    Assets represent physical
        equipment such as:\n\n    - Machines\n    - Pumps\n    - Motors\n    - Sensors\n\n
        \   Assets belong to areas inside plants.\n    "

openapi: 3.0.3
info:
  title: ForgeMind API
  version: 1.0.0
  description: |2

    ForgeMind Industrial AI Platform API.

    This API provides backend services for:

    - Identity and authentication management
    - Organization hierarchy management
    - Industrial asset management
    - Asset monitoring foundation
    - AI-powered industrial intelligence

    Authentication:
    JWT Bearer Token authentication is required
    for protected endpoints.
  contact:
    name: ForgeMind Engineering Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
paths:
  /api/v1/areas/:
    get:
      operationId: areas_list
      description: CRUD API for areas.
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: plant
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - areas
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAreaList'
          description: ''
    post:
      operationId: areas_create
      description: CRUD API for areas.
      tags:
      - areas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AreaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AreaRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Area'
          description: ''
  /api/v1/areas/{id}/:
    get:
      operationId: areas_retrieve
      description: CRUD API for areas.
      parameters:
      - in: path
        name: id

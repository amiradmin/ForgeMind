components:
  schemas:
    Area:
      type: object
      description: Serializer for Area.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        plant:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        code:
          type: string
          maxLength: 50
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - plant
      - updated_at
    AreaRequest:
      type: object
      description: Serializer for Area.
      properties:
        plant:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 255
        code:
          type: string
          minLength: 1
          maxLength: 50
        is_active:
          type: boolean
      required:
      - code
      - name
      - plant
    Asset:
      type: object
      description: Serializer for Asset.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        area:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        code:
          type: string
          maxLength: 50
        asset_type:
          $ref: '#/components/schemas/AssetTypeEnum'
        manufacturer:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        serial_number:
          type: string
          maxLength: 100
        installation_date:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - area
      - code
      - created_at
      - id
      - name
      - updated_at
    AssetRequest:
      type: object
      description: Serializer for Asset.
      properties:
        area:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 200
        code:
          type: string
          minLength: 1
          maxLength: 50
        asset_type:
          $ref: '#/components/schemas/AssetTypeEnum'
        manufacturer:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        serial_number:
          type: string
          maxLength: 100
        installation_date:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
      required:
      - area
      - code
      - name
    AssetTypeEnum:
      enum:
      - motor
      - pump
      - valve
      - sensor
      - plc
      - conveyor
      - other
      type: string
      description: |-
        * `motor` - Motor
        * `pump` - Pump
        * `valve` - Valve
        * `sensor` - Sensor
        * `plc` - PLC
        * `conveyor` - Conveyor
        * `other` - Other
    HealthCheck:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          additionalProperties: {}
      required:
      - checks
      - service
      - status
      - timestamp
      - version
    Organization:
      type: object
      description: Serializer for Organization.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    OrganizationRequest:
      type: object
      description: Serializer for Organization.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        is_active:
          type: boolean
      required:
      - name
    PaginatedAreaList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Area'
    PaginatedAssetList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123

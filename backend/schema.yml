            schema:
              $ref: '#/components/schemas/AssetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':

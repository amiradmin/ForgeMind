          type: string
          format: uuid
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: lifecycle_status
        schema:
          type: string
          enum:
          - commissioned
          - installed
          - maintenance
          - operational
          - out_of_service
          - planned
          - retired
        description: |-
          * `planned` - Planned
          * `installed` - Installed
          * `commissioned` - Commissioned
          * `operational` - Operational
          * `maintenance` - Maintenance
          * `out_of_service` - Out of Service
          * `retired` - Retired

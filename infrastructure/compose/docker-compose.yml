version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: forgemind-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: forgemind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: forgemind-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data:
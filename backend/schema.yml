  /api/v1/areas/:
    get:
      operationId: areas_list
      description: "\n    Manage industrial production areas.\n\n    Areas represent
        logical divisions inside\n    industrial plants.\n    "
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: plant
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Areas
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAreaList'
          description: ''
    post:
      operationId: areas_create
      description: "\n    Manage industrial production areas.\n\n    Areas represent
        logical divisions inside\n    industrial plants.\n    "
      tags:
      - Areas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AreaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AreaRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Area'
          description: ''
